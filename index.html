<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yan Jiachu | 颜嘉楚</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header .chinese-name {
            font-size: 1.5em;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .header . affiliations {
            font-size: 1.1em;
            opacity: 0.85;
        }

        .content {
            padding: 40px;
        }

        .section {
            margin-bottom: 35px;
        }

        .section h2 {
            color: #667eea;
            font-size: 1.4em;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }

        .section p {
            font-size: 1.05em;
            color: #555;
        }

        .education-item {
            margin-bottom: 20px;
        }

        .education-item h3 {
            color: #333;
            font-size: 1.15em;
            margin-bottom: 5px;
        }

        .education-item .period {
            color: #888;
            font-size: 0.95em;
        }

        .education-item .expected {
            color: #e67e22;
            font-size: 0.9em;
        }

        .research-interests {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 0.95em;
        }

        .footer {
            background: #f8f9fa;
            padding: 25px 40px;
            text-align: center;
            border-top: 1px solid #eee;
        }

        .footer p {
            color: #888;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .header {
                padding: 40px 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .content {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Yan Jiachu</h1>
            <p class="chinese-name">颜嘉楚</p>
            <p class="affiliations">计算机科学与技术</p>
        </div>

        <div class="content">
            <div class="section">
                <h2>教育背景</h2>
                <div class="education-item">
                    <h3>中国科学院大学计算技术研究所 (UCAS.ICT)</h3>
                    <p class="period">2025 - 2028 <span class="expected">(预计)</span></p>
                    <p>硕士</p>
                </div>
                <div class="education-item">
                    <h3>北京理工大学 (BIT)</h3>
                    <p class="period">2021 - 2025</p>
                    <p>本科</p>
                </div>
            </div>

            <div class="section">
                <h2>研究方向</h2>
                <div class="research-interests">
                    <span class="tag">自然语言处理 (NLP)</span>
                    <span class="tag">大模型数据 (LLM Data)</span>
                    <span class="tag">计算机科学与技术</span>
                </div>
            </div>

            <div class="section">
                <h2>关于我</h2>
                <p>欢迎来到我的个人主页！</p>
            </div>
        </div>

        <div class="footer">
            <p>Powered by GitHub Pages</p>
        </div>
    </div>
</body>
</html>
